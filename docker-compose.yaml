version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: miniwsa_postgres
    environment:
      POSTGRES_DB: miniwsa_db
      POSTGRES_USER: miniwsa_user
      POSTGRES_PASSWORD: miniwsa_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - miniwsa_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniwsa_user -d miniwsa_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  miniwsa_network:
    driver: bridge

